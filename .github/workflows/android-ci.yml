name: Android CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x Client/gradlew

      - name: Run backend tests
        run: python -m unittest discover -s Client/server -p "test_*.py"

      - name: Build debug APKs
        working-directory: Client
        run: ./gradlew --no-daemon clean assembleDebug :monitor:assembleDebug

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guardianstar-apks
          path: |
            Client/build/outputs/apk/debug/GuardianStar-debug.apk
            Monitor/build/outputs/apk/debug/monitor-debug.apk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v8
        with:
          name: guardianstar-apks
          path: dist

      - name: Resolve release notes
        id: release_notes
        shell: bash
        run: |
          NOTES_PATH="docs/releases/${GITHUB_REF_NAME}.md"
          OUTPUT_PATH="${RUNNER_TEMP}/release-notes.md"
          if [ -f "$NOTES_PATH" ]; then
            cp "$NOTES_PATH" "$OUTPUT_PATH"
          else
            {
              echo "# ${GITHUB_REF_NAME}"
              echo
              echo "Automated GuardianStar release build."
            } > "$OUTPUT_PATH"
          fi
          echo "body_path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release_notes.outputs.body_path }}
          files: |
            dist/**/*.apk
