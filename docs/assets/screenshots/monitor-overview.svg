<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1520" viewBox="0 0 720 1520" role="img" aria-labelledby="title desc">
  <title id="title">GuardianStar Monitor Overview Mock Screenshot</title>
  <desc id="desc">Real-device style screenshot mock for GuardianStar Monitor overview.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef9f2"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f3f2d"/>
      <stop offset="100%" stop-color="#1f7352"/>
    </linearGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="20" result="off"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.22"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="720" height="1520" fill="#d6e9dc"/>
  <rect x="62" y="28" width="596" height="1464" rx="64" fill="#11161d" filter="url(#drop)"/>
  <rect x="80" y="54" width="560" height="1412" rx="52" fill="url(#pageBg)"/>
  <rect x="280" y="74" width="160" height="24" rx="12" fill="#2b3542"/>
  <circle cx="470" cy="86" r="7" fill="#4b5563"/>

  <rect x="110" y="132" width="500" height="160" rx="24" fill="url(#bar)"/>
  <text x="146" y="194" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="37" font-weight="700">Guardian Monitor</text>
  <text x="146" y="234" fill="#d3f2e2" font-family="Segoe UI, Arial, sans-serif" font-size="23">2 devices online</text>
  <rect x="458" y="176" width="122" height="40" rx="20" fill="#d9fbe8"/>
  <text x="494" y="202" fill="#1d8a52" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">SYNC</text>

  <rect x="110" y="318" width="500" height="100" rx="18" fill="#ffffff" stroke="#d4e8dc"/>
  <rect x="128" y="342" width="148" height="52" rx="26" fill="#b8efd1"/>
  <text x="166" y="375" fill="#0e7340" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="600">A-Child</text>
  <rect x="288" y="342" width="148" height="52" rx="26" fill="#eef7f1"/>
  <text x="327" y="375" fill="#4b6f5d" font-family="Segoe UI, Arial, sans-serif" font-size="21">B-Child</text>
  <rect x="448" y="342" width="144" height="52" rx="26" fill="#f5faf7"/>
  <text x="488" y="375" fill="#4b6f5d" font-family="Segoe UI, Arial, sans-serif" font-size="21">All</text>

  <rect x="110" y="446" width="500" height="454" rx="20" fill="#ffffff" stroke="#d4e8dc"/>
  <text x="138" y="500" fill="#1b4032" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="650">Live Map</text>
  <rect x="138" y="524" width="444" height="348" rx="14" fill="#e9f6ee" stroke="#cde5d8"/>
  <circle cx="360" cy="692" r="14" fill="#1e7f4e"/>
  <circle cx="360" cy="692" r="60" fill="#66d99b" opacity="0.28"/>
  <path d="M 180 780 Q 250 700 360 692 Q 470 684 540 610" stroke="#2d995f" stroke-width="6" fill="none"/>
  <path d="M 170 560 Q 245 625 320 640" stroke="#75c69a" stroke-width="4" fill="none" stroke-dasharray="9,8"/>

  <rect x="110" y="928" width="500" height="164" rx="20" fill="#ffffff" stroke="#d4e8dc"/>
  <text x="138" y="982" fill="#1b4032" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="650">Latest Alert</text>
